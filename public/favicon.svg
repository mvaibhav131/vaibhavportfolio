<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <linearGradient id="vm-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="#0e1120"/>

  <!-- Arc ring (270deg arc, starting from top) -->
  <circle
    cx="50" cy="50" r="42"
    fill="none"
    stroke="url(#ring-grad)"
    stroke-width="3"
    stroke-linecap="round"
    stroke-dasharray="219 264"
    transform="rotate(-90 50 50)"
  />

  <!-- VM text -->
  <text
    x="50" y="60"
    text-anchor="middle"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="32"
    letter-spacing="-1"
    fill="url(#vm-grad)"
  >VM</text>
</svg>
